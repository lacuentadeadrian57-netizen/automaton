{% extends 'base.html' %} 

{% block head %}
<title>Grid Editor</title>
{% endblock %} 

{% block body %} 
<main class="content">
    <div style="display: flex; align-items: center; position: absolute; top: 0; right: 0;">
        <label style="padding: 5px;" class="strong_text">{{name}}</label>
        <a href="/login" style="padding-right: 10px;">
            <span>
                <svg 
                    style="width: 48px; height: 48px;" 
                    fill="none"
                    viewBox="0 0 24 24" 
                    stroke-width="1.5" 
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
            </span>
        </a>
    </div>
    <h1>Grid Editor</h1>
    <form style="width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px;">
        <fieldset class="nodecoration">
            <label for="row">Rows: </label>
            <input value="0" type="number" name="row" id="row" class="nodecoration input-num">
        </fieldset>
        <fieldset class="nodecoration">
            <label for="column">Columns: </label>
            <input value="0" type="number" name="column" id="column" class="nodecoration input-num">
        </fieldset>
        <button type="submit" class="strong_text">Update</button>
    </form>
    <div>
        <div id="grid" class="grid">
        </div>
        <menu style="display: flex; width: 100%; padding: 0px; justify-content: center; align-items: center; gap: 5px;">
            <button id="back_btn" type="button" class="icon-button">
                <svg viewBox="0 0 24 24" fill="currentColor" class="size-6">
                    <path d="M9.195 18.44c1.25.714 2.805-.189 2.805-1.629v-2.34l6.945 3.968c1.25.715 2.805-.188 2.805-1.628V8.69c0-1.44-1.555-2.343-2.805-1.628L12 11.029v-2.34c0-1.44-1.555-2.343-2.805-1.628l-7.108 4.061c-1.26.72-1.26 2.536 0 3.256l7.108 4.061Z" />
                </svg>
            </button>
            <button id="toggle_btn" type="button" class="icon-button" style="--main-color: #00ae00">
                <svg id="play_icon" viewBox="0 0 24 24" fill="currentColor" class="size-6" style="padding-left: 2px;">
                    <path fill-rule="evenodd" d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z" clip-rule="evenodd" />
                </svg>
                <svg id="pause_icon" viewBox="0 0 24 24" fill="currentColor" class="size-6 off">
                    <path fill-rule="evenodd" d="M6.75 5.25a.75.75 0 0 1 .75-.75H9a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H7.5a.75.75 0 0 1-.75-.75V5.25Zm7.5 0A.75.75 0 0 1 15 4.5h1.5a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H15a.75.75 0 0 1-.75-.75V5.25Z" clip-rule="evenodd" />
                </svg> 
            </button>
            <button id="reset_btn" type="button" class="icon-button" style="--main-color: #a1a1a1">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
            </button>
            <button id="fordward_btn" type="button" class="icon-button">
                <svg viewBox="0 0 24 24" fill="currentColor" class="size-6">
                    <path d="M5.055 7.06C3.805 6.347 2.25 7.25 2.25 8.69v8.122c0 1.44 1.555 2.343 2.805 1.628L12 14.471v2.34c0 1.44 1.555 2.343 2.805 1.628l7.108-4.061c1.26-.72 1.26-2.536 0-3.256l-7.108-4.061C13.555 6.346 12 7.249 12 8.689v2.34L5.055 7.061Z" />
                </svg>
            </button>
        </menu>
    </div>
</main>
{% endblock %}


{% block scripts %} 
    <script src="{{url_for('static', filename='js/app.js')}}"></script>
{% endblock %}
